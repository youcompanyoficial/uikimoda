<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Shopee — Império DM Sexy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --bg: #0d0d0d; --surface: #141414; --surface2: #1c1c1c; --border: #2a2a2a;
    --border2: #333; --orange: #EE4D2D; --orange-dim: rgba(238,77,45,0.12);
    --orange-mid: rgba(238,77,45,0.25); --text: #f0ede8; --text-muted: #888;
    --text-dim: #555; --green: #4ade80; --green-dim: rgba(74,222,128,0.10);
    --yellow: #f59e0b; --yellow-dim: rgba(245,158,11,0.10); --radius: 14px; --radius-sm: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo-text { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 17px; color: var(--text); }
  .main { display: grid; grid-template-columns: 380px 1fr; min-height: calc(100vh - 73px); }
  .panel-left { background: var(--surface); border-right: 1px solid var(--border); padding: 32px 28px; display: flex; flex-direction: column; gap: 20px; }
  .input-row { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 12px; margin-bottom: 10px; }
  .input-row input { background: transparent; border: none; color: var(--text); text-align: right; width: 100%; outline: none; padding: 10px 0; font-family: 'DM Mono', monospace; }
  .photo-upload { border: 1.5px dashed var(--border2); border-radius: var(--radius-sm); background: var(--surface2); min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; }
  .photo-upload img { width: 100%; height: 160px; object-fit: cover; border-radius: var(--radius-sm); display: none; }
  .btn-salvar { width: 100%; background: var(--orange); border: none; color: #fff; font-weight: 700; padding: 15px; border-radius: var(--radius-sm); cursor: pointer; margin-top: 10px; }
  .panel-right { padding: 32px; }
  .result-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
</style>
</head>
<body>

<header>
  <div class="logo-text">IMPÉRIO DM SEXY <span style="font-size: 10px; color: var(--orange);">PRICING</span></div>
  <div class="badge-shopee">SUPABASE ACTIVE</div>
</header>

<div class="main">
  <div class="panel-left">
    <h3 style="font-size: 14px; margin-bottom: 10px;">DADOS DO PRODUTO</h3>
    
    <div class="photo-upload" id="dropzone">
      <input type="file" id="input_foto" accept="image/*" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;">
      <div id="placeholder">📸 Toque para adicionar foto</div>
      <img id="preview" src="">
    </div>

    <input type="text" id="nome_produto" class="input-row" style="width:100%; padding:12px;" placeholder="Nome do Produto">

    <div class="input-row">
      <label style="font-size:12px; color:var(--text-muted)">Custo (R$)</label>
      <input type="number" id="custo" value="0.00" step="0.01">
    </div>

    <div class="input-row">
      <label style="font-size:12px; color:var(--text-muted)">Venda (R$)</label>
      <input type="number" id="venda" value="0.00" step="0.01">
    </div>

    <button class="btn-salvar" onclick="salvarNoSupabase()">SALVAR NO BANCO DE DADOS</button>
    <p id="status" style="font-size:12px; text-align:center; margin-top:10px; color:var(--text-muted)"></p>
  </div>

  <div class="panel-right">
    <div class="result-box">
      <h2>Resumo do Cálculo</h2>
      <p style="color:var(--text-dim); margin-bottom:20px;">Os dados abaixo serão sincronizados com seu Supabase.</p>
      <div id="resultado_texto">Preencha os valores para calcular...</div>
    </div>
  </div>
</div>

<script>
  // CONFIGURAÇÃO DO SEU SUPABASE
  const SUPABASE_URL = 'https://uvgspomojtcfrvfiqsot.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2Z3Nwb21vanRjZnJ2Zmlxc290Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTgxMDQsImV4cCI6MjA5MjE5NDEwNH0.EmZTLCApMT0AAHZAOn40mVUl3BWK8SillokW7FOEuaA';
  
  const supabase = Object.assign(supabase.createClient(SUPABASE_URL, SUPABASE_KEY));

  // Preview da foto
  document.getElementById('input_foto').addEventListener('change', function(e) {
    const reader = new FileReader();
    reader.onload = function() {
      const img = document.getElementById('preview');
      img.src = reader.result;
      img.style.display = 'block';
      document.getElementById('placeholder').style.display = 'none';
    }
    reader.readAsDataURL(e.target.files[0]);
  });

  async function salvarNoSupabase() {
    const status = document.getElementById('status');
    const file = document.getElementById('input_foto').files[0];
    const nome = document.getElementById('nome_produto').value;
    const v_custo = document.getElementById('custo').value;
    const v_venda = document.getElementById('venda').value;

    if (!nome || !file) {
      alert("Por favor, preencha o nome e adicione uma foto.");
      return;
    }

    status.innerText = "⏳ Salvando dados e foto...";

    try {
      // 1. Upload da Foto para o Bucket 'produtos'
      const fileName = `${Date.now()}_${file.name}`;
      const { data: uploadData, error: uploadError } = await supabase.storage
        .from('produtos')
        .upload(fileName, file);

      if (uploadError) throw uploadError;

      // 2. Pegar URL da Foto
      const { data: urlData } = supabase.storage.from('produtos').getPublicUrl(fileName);
      const fotoUrl = urlData.publicUrl;

      // 3. Salvar na Tabela 'calculos'
      const { error: dbError } = await supabase
        .from('calculos')
        .insert([{
          nome: nome,
          custo: parseFloat(v_custo),
          venda: parseFloat(v_venda),
          foto_url: fotoUrl,
          data_criacao: new Date()
        }]);

      if (dbError) throw dbError;

      status.innerText = "✅ Salvo com sucesso!";
      status.style.color = "#4ade80";

    } catch (err) {
      console.error(err);
      status.innerText = "❌ Erro ao salvar: " + err.message;
      status.style.color = "#ee4d2d";
    }
  }
</script>
</body>
</html>
