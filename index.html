<!DOCTYPE html>

    <style>
        :root {
            --bg: #0d0d0d; --surface: #141414; --surface2: #1c1c1c;
            --border: #2a2a2a; --orange: #EE4D2D; --text: #f0ede8;
            --text-muted: #888; --text-dim: #555; --green: #4ade80; --radius: 14px;
        }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: var(--surface); border: 1px solid var(--border); padding: 30px; border-radius: var(--radius); width: 100%; max-width: 450px; }
        h1 { font-family: 'Syne', sans-serif; color: var(--orange); text-align: center; font-size: 22px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; background: var(--surface2); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: #white; color-scheme: dark; font-size: 14px; box-sizing: border-box; }
        input:focus { border-color: var(--orange); outline: none; }
        .btn-salvar { width: 100%; background: var(--orange); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; font-family: 'Syne', sans-serif; margin-top: 10px; transition: 0.2s; }
        .btn-salvar:hover { opacity: 0.9; transform: scale(0.98); }
        #preview-box { width: 100%; height: 180px; background: var(--surface2); border: 1px dashed var(--border); border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #preview-img { max-width: 100%; max-height: 100%; display: none; }
    </style>
</head>
<body>

<div class="container">

        <span id="txt-placeholder" style="color:var(--text-dim); font-size: 12px;">Prévia da Foto</span>
        <img id="preview-img" src="">
    </div>

    <div class="input-group">
        <label>Foto do Produto</label>
        <input type="file" id="foto_file" accept="image/*">
    </div>

    <div class="input-group">
        <label>Nome do Produto</label>
        <input type="text" id="nome_item" placeholder="Digite o nome...">
    </div>

    <div class="input-group">
        <label>Custo (R$)</label>
        <input type="number" id="custo_prod" step="0.01" placeholder="0,00">
    </div>

    <div class="input-group">
        <label>Preço de Venda (R$)</label>
        <input type="number" id="venda_final" step="0.01" placeholder="0,00">
    </div>

    <button class="btn-salvar" id="btnSalvar" onclick="enviarDados()">SALVAR NO SUPABASE</button>
</div>

<script>
    // CREDENCIAIS
    const URL = 'https://uvgspomojtcfrvfiqsot.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2Z3Nwb21vanRjZnJ2Zmlxc290Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTgxMDQsImV4cCI6MjA5MjE5NDEwNH0.EmZTLCApMT0AAHZAOn40mVUl3BWK8SillokW7FOEuaA';
    const supabaseClient = supabase.createClient(URL, KEY);

    // Preview da imagem
    document.getElementById('foto_file').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = document.getElementById('preview-img');
                img.src = ev.target.result;
                img.style.display = 'block';
                document.getElementById('txt-placeholder').style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    });

    async function enviarDados() {
        const btn = document.getElementById('btnSalvar');
        const file = document.getElementById('foto_file').files[0];
        const nome = document.getElementById('nome_item').value;
        const custo = document.getElementById('custo_prod').value;
        const venda = document.getElementById('venda_final').value;

        if (!file || !nome || !custo || !venda) {
            alert("Preencha todos os campos!");
            return;
        }

        btn.innerText = "SALVANDO...";
        btn.disabled = true;

        try {
            // 1. Upload Foto
            const path = `${Date.now()}_${file.name}`;
            const { data: upData, error: upErr } = await supabaseClient.storage
                .from('produtos')
                .upload(path, file);
            if (upErr) throw upErr;

            const { data: urlData } = supabaseClient.storage.from('produtos').getPublicUrl(path);

            // 2. Insert na Tabela (Ajustado para suas colunas exatas)
            const { error: dbErr } = await supabaseClient
                .from('calculos')
                .insert([{
                    nome_item: nome,
                    custo_produto: parseFloat(custo),
                    valor_final: parseFloat(venda),
                    foto_url: urlData.publicUrl
                }]);

            if (dbErr) throw dbErr;

            alert("✅ Salvo com sucesso!");
            location.reload();

        } catch (e) {
            alert("Erro: " + e.message);
            btn.innerText = "TENTAR NOVAMENTE";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
